<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FDA Notification - Barcode Scan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&amp;family=Fira+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#004d40",
                    "on-primary-fixed-variant": "#065043",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#163440",
                    "outline-variant": "#bfc9c4",
                    "on-tertiary-fixed": "#1c1c18",
                    "tertiary-fixed-dim": "#c9c6c0",
                    "tertiary-container": "#44443f",
                    "background": "#f4faff",
                    "surface-container-high": "#ceedfd",
                    "primary": "#00342b",
                    "inverse-primary": "#94d3c1",
                    "surface": "#f4faff",
                    "on-surface": "#001f2a",
                    "on-secondary-fixed": "#380c00",
                    "on-secondary-fixed-variant": "#822800",
                    "primary-fixed-dim": "#94d3c1",
                    "outline": "#707975",
                    "on-surface-variant": "#3f4945",
                    "on-secondary-container": "#6b1f00",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-background": "#001f2a",
                    "surface-dim": "#c0dfee",
                    "secondary-fixed": "#ffdbcf",
                    "surface-container-low": "#e6f6ff",
                    "error": "#ba1a1a",
                    "primary-fixed": "#afefdd",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#c9e7f7",
                    "secondary": "#a43c12",
                    "surface-variant": "#c9e7f7",
                    "on-primary-container": "#7ebdac",
                    "surface-tint": "#29695b",
                    "secondary-fixed-dim": "#ffb59c",
                    "surface-bright": "#f4faff",
                    "secondary-container": "#fe7e4f",
                    "tertiary-fixed": "#e5e2db",
                    "on-tertiary-fixed-variant": "#474742",
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#00201a",
                    "tertiary": "#2e2e29",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#b3b1ab",
                    "surface-container": "#d9f2ff",
                    "inverse-on-surface": "#e0f4ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-desktop": "48px",
                    "container-max": "1120px",
                    "base": "8px",
                    "margin-mobile": "16px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "label-md": ["Fira Sans"],
                    "display-lg": ["Merriweather"],
                    "label-sm": ["Fira Sans"],
                    "body-md": ["Fira Sans"],
                    "headline-sm": ["Merriweather"],
                    "headline-md": ["Merriweather"],
                    "body-lg": ["Fira Sans"],
                    "display-lg-mobile": ["Merriweather"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-sm": ["22px", {"lineHeight": "30px", "fontWeight": "700"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-cutout {
            /* Full screen mask with capsule hole */
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
        }
        .scan-animation {
            animation: scan-move 3s infinite ease-in-out;
        }
        @keyframes scan-move {
            0%, 100% { transform: translateY(-80px); opacity: 0; }
            50% { transform: translateY(80px); opacity: 1; }
        }
        /* Native-like camera view aspect */
        .viewport-container {
            position: fixed;
            inset: 0;
            background: #000;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Native-style Viewfinder Container -->
<div class="viewport-container">
<!-- Simulated Camera Feed -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-slate-900 flex items-center justify-center">
<span class="material-symbols-outlined text-white/10 text-9xl">photo_camera</span>
</div>
</div>
<!-- UI Overlay -->
<div class="relative z-10 h-full flex flex-col">
<!-- Top Bar -->
<header class="flex items-center justify-between p-margin-mobile md:px-margin-desktop pt-8">
<div class="flex items-center gap-2">
<span class="font-headline-sm text-headline-sm font-bold text-white drop-shadow-md">FDA Notification</span>
</div>
<button aria-label="Close Scanner" class="p-3 bg-black/40 backdrop-blur-md rounded-full text-white hover:bg-black/60 transition-all active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Centered Scanning Guide -->
<div class="flex-grow flex flex-col items-center justify-center">
<!-- Capsule Shape Guide for Bottle -->
<div class="relative w-[240px] h-[360px] md:w-[280px] md:h-[420px] rounded-[100px] border-2 border-primary-fixed-dim/60 scanner-cutout flex items-center justify-center">
<!-- Laser Line Animation -->
<div class="scan-animation absolute w-[80%] h-0.5 bg-inverse-primary shadow-[0_0_15px_rgba(148,211,193,0.8)] z-20"></div>
<!-- Corner Indicators -->
<div class="absolute top-12 left-6 w-8 h-8 border-t-2 border-l-2 border-primary-fixed-dim rounded-tl-2xl"></div>
<div class="absolute top-12 right-6 w-8 h-8 border-t-2 border-r-2 border-primary-fixed-dim rounded-tr-2xl"></div>
<div class="absolute bottom-12 left-6 w-8 h-8 border-b-2 border-l-2 border-primary-fixed-dim rounded-bl-2xl"></div>
<div class="absolute bottom-12 right-6 w-8 h-8 border-b-2 border-r-2 border-primary-fixed-dim rounded-br-2xl"></div>
</div>
<!-- Status Text -->
<div class="mt-8 px-6 py-2 bg-black/40 backdrop-blur-md rounded-full border border-white/10 flex items-center gap-3">
<span class="material-symbols-outlined text-inverse-primary text-sm">qr_code_scanner</span>
<span class="font-label-md text-label-md text-white tracking-wide">Position the bottle in the frame</span>
</div>
</div>
<!-- Bottom UI Section -->
<div class="bg-gradient-to-t from-black via-black/80 to-transparent pt-12 pb-10 px-margin-mobile">
<!-- Manual Entry Link -->
<div class="flex justify-center mb-8">
<button class="text-white font-label-md text-label-md underline underline-offset-4 hover:text-inverse-primary transition-colors p-2">
                    Can't scan? Enter manually
                </button>
</div>
<!-- Controls Row -->
<div class="max-w-md mx-auto flex items-center justify-between gap-4">
<!-- Action Icons -->
<div class="flex items-center gap-6">
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white">flashlight_on</span>
</div>
<span class="text-[10px] font-medium text-white/70 uppercase tracking-widest">Torch</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white">history</span>
</div>
<span class="text-[10px] font-medium text-white/70 uppercase tracking-widest">Recent</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white">help</span>
</div>
<span class="text-[10px] font-medium text-white/70 uppercase tracking-widest">Tips</span>
</button>
</div>
<!-- Cancel Button -->
<button class="px-8 py-3 bg-white text-black font-label-md rounded-full hover:bg-surface-dim transition-all active:scale-95 shadow-lg">
                    Cancel
                </button>
</div>
</div>
</div>
</div>
<!-- Legal/Identity Footer (Small Overlay) -->
<footer class="fixed bottom-2 left-0 right-0 z-50 text-center">
<p class="text-[10px] text-white/40 font-label-sm">
        Independent platform not affiliated with the U.S. Government. © 2024 FDA Notification.
    </p>
</footer>
</body></html>
